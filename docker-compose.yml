services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: doclet
      POSTGRES_PASSWORD: doclet
      POSTGRES_DB: doclet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
